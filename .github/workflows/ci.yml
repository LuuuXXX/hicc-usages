name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-linux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        chunk: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake make

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python deps
        run: pip install jinja2 pyyaml

      - name: Run pipeline chunk ${{ matrix.chunk }}/4
        run: bash scripts/run-pipeline-chunk.sh ${{ matrix.chunk }} 4

  test-macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          brew install clang cmake make

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python deps
        run: pip3 install jinja2 pyyaml

      - name: C++ build & test
        run: bash scripts/cpp-build-all.sh

      - name: Rust gen & test
        run: |
          bash scripts/rust-gen-all.sh
          bash scripts/rust-test-all.sh

  test-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install LLVM
        run: choco install llvm -y

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python deps
        run: pip install jinja2 pyyaml

      - name: C++ build & test
        shell: bash
        run: bash scripts/cpp-build-all.sh

      - name: Rust gen & test
        shell: bash
        run: |
          bash scripts/rust-gen-all.sh
          bash scripts/rust-test-all.sh
